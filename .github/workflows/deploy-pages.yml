name: Deploy Frontend to GitHub Pages

on:
  # Chạy khi push lên nhánh main
  push:
    branches: ["main"]

  # Cho phép chạy tay từ tab Actions
  workflow_dispatch:

# Cấp quyền cho GitHub Actions được phép ghi đè lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chặn việc chạy nhiều luồng deploy cùng lúc
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend
        # Đặt đường dẫn base name theo tên kho lưu trữ GitHub của bạn
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_URL: https://phong-thuy-backend.onrender.com/api

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
